<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dofus Touch Calculator</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body { background: #1a1a2e; color: #e0e0e0; }
    .card { background: #16213e; border: 1px solid #0f3460; }
    .card-header { background: #0f3460; color: #e0e0e0; font-weight: bold; }
    .table { color: #e0e0e0; }
    .table thead th { background: #0f3460; }
    .table-striped > tbody > tr:nth-of-type(odd) > * { background: #1a2a4a; color: #e0e0e0; }
    .table-striped > tbody > tr:nth-of-type(even) > * { background: #16213e; color: #e0e0e0; }
    .progress { background: #0f3460; }
    select, input { background: #0f3460 !important; color: #e0e0e0 !important; border-color: #3a6186 !important; }
    option { background: #0f3460; }
    .missing-badge { background: #c0392b; }
    .profit-positive { color: #2ecc71; font-weight: bold; }
    .profit-negative { color: #e74c3c; font-weight: bold; }
    #shopping-select { min-height: 120px; }
  </style>
</head>
<body>
  <div class="container py-4">
    <h1 class="text-center mb-4" style="color:#e0c040;">⚔️ Dofus Touch Calculator</h1>

    <!-- Sélection de recette -->
    <div class="card mb-4">
      <div class="card-header">Calculer une recette</div>
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-6">
            <label class="form-label">Recette</label>
            <select id="recipe-select" class="form-select">
              {% for name in recipe_names %}
              <option value="{{ name }}">{{ name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Prix de vente HDV (kamas)</label>
            <input type="number" id="sell-price-input" class="form-control" placeholder="ex: 500000" min="0" />
          </div>
          <div class="col-md-3">
            <button class="btn btn-warning w-100" onclick="calculate()">Calculer</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Résultats -->
    <div id="results-section" class="card mb-4 d-none">
      <div class="card-header" id="results-title">Résultats</div>
      <div class="card-body">
        <!-- Barre de complétion -->
        <div class="mb-3">
          <div class="d-flex justify-content-between mb-1">
            <span>Complétion</span>
            <span id="completion-label">0%</span>
          </div>
          <div class="progress" style="height:18px;">
            <div id="completion-bar" class="progress-bar bg-success" style="width:0%"></div>
          </div>
        </div>

        <!-- Tableau des ressources -->
        <div class="table-responsive">
          <table class="table table-striped table-sm align-middle">
            <thead>
              <tr>
                <th>Ressource</th>
                <th class="text-end">Requis</th>
                <th class="text-end">Acquis</th>
                <th class="text-end">Manquant</th>
                <th class="text-end">Val. unit.</th>
                <th class="text-end">Coût total</th>
              </tr>
            </thead>
            <tbody id="results-tbody"></tbody>
          </table>
        </div>

        <!-- Coût total + rentabilité -->
        <div class="row mt-3">
          <div class="col-md-6">
            <div class="alert alert-secondary py-2 mb-2">
              <strong>Coût de craft :</strong> <span id="craft-cost">—</span> kamas
            </div>
          </div>
          <div class="col-md-6" id="profit-section" style="display:none;">
            <div class="alert alert-secondary py-2 mb-2">
              <strong>Bénéfice :</strong> <span id="profit-value">—</span>
              &nbsp; <span id="margin-value" class="badge bg-secondary"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Liste de courses multi-recettes -->
    <div class="card mb-4">
      <div class="card-header">Liste de courses multi-recettes</div>
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-8">
            <label class="form-label">Sélectionnez les recettes (Ctrl+clic pour plusieurs)</label>
            <select id="shopping-select" class="form-select" multiple>
              {% for name in recipe_names %}
              <option value="{{ name }}">{{ name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4">
            <button class="btn btn-primary w-100" onclick="computeShoppingList()">Calculer la liste</button>
          </div>
        </div>

        <div id="shopping-results" class="mt-3 d-none">
          <div class="table-responsive">
            <table class="table table-striped table-sm align-middle">
              <thead>
                <tr>
                  <th>Ressource</th>
                  <th class="text-end">Total requis</th>
                  <th class="text-end">Acquis</th>
                  <th class="text-end">Manquant</th>
                  <th class="text-end">Val. unit.</th>
                  <th class="text-end">Coût total</th>
                </tr>
              </thead>
              <tbody id="shopping-tbody"></tbody>
            </table>
          </div>
          <div class="alert alert-secondary py-2">
            <strong>Coût total estimé :</strong> <span id="shopping-total">—</span> kamas
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function fmtKamas(n) {
      return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "\u00a0");
    }

    async function calculate() {
      const recipeName = document.getElementById("recipe-select").value;
      const sellPrice = parseInt(document.getElementById("sell-price-input").value) || 0;

      if (sellPrice > 0) {
        await fetch("/api/sell-price", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ recipe_name: recipeName, sell_price: sellPrice }),
        });
      }

      const resp = await fetch("/api/calculate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ recipe_name: recipeName }),
      });
      if (!resp.ok) {
        const err = await resp.json();
        alert(err.error || "Erreur inconnue");
        return;
      }
      const data = await resp.json();

      document.getElementById("results-section").classList.remove("d-none");
      document.getElementById("results-title").textContent = "Résultats — " + data.recipe_name;

      document.getElementById("completion-label").textContent = data.pct + "% (" + data.completed + "/" + data.total + ")";
      document.getElementById("completion-bar").style.width = data.pct + "%";

      const tbody = document.getElementById("results-tbody");
      tbody.innerHTML = "";
      for (const row of data.rows) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.resource}</td>
          <td class="text-end">${row.needed}</td>
          <td class="text-end">${row.acquired}</td>
          <td class="text-end">${row.missing > 0 ? '<span class="badge missing-badge">' + row.missing + '</span>' : '<span class="text-success">✓</span>'}</td>
          <td class="text-end">${fmtKamas(row.unit_value)}</td>
          <td class="text-end">${fmtKamas(row.total_cost)}</td>
        `;
        tbody.appendChild(tr);
      }

      document.getElementById("craft-cost").textContent = fmtKamas(data.kamas_manquant);

      const profitSection = document.getElementById("profit-section");
      if (data.profitability) {
        profitSection.style.display = "";
        const profitEl = document.getElementById("profit-value");
        profitEl.textContent = (data.profitability.profit >= 0 ? "+" : "") + fmtKamas(data.profitability.profit) + " kamas";
        profitEl.className = data.profitability.is_profitable ? "profit-positive" : "profit-negative";
        const marginEl = document.getElementById("margin-value");
        marginEl.textContent = (data.profitability.margin_pct >= 0 ? "+" : "") + data.profitability.margin_pct + "%";
        marginEl.className = "badge " + (data.profitability.is_profitable ? "bg-success" : "bg-danger");
      } else {
        profitSection.style.display = "none";
      }
    }

    async function computeShoppingList() {
      const select = document.getElementById("shopping-select");
      const selected = Array.from(select.selectedOptions).map(o => o.value);
      if (selected.length === 0) {
        alert("Sélectionnez au moins une recette.");
        return;
      }

      const resp = await fetch("/api/shopping-list", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ recipe_names: selected }),
      });
      if (!resp.ok) {
        const err = await resp.json();
        alert(err.error || "Erreur inconnue");
        return;
      }
      const data = await resp.json();

      document.getElementById("shopping-results").classList.remove("d-none");
      const tbody = document.getElementById("shopping-tbody");
      tbody.innerHTML = "";
      for (const item of data.items) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${item.resource.replace(/_/g, " ")}</td>
          <td class="text-end">${item.needed}</td>
          <td class="text-end">${item.acquired}</td>
          <td class="text-end">${item.missing > 0 ? '<span class="badge missing-badge">' + item.missing + '</span>' : '<span class="text-success">✓</span>'}</td>
          <td class="text-end">${fmtKamas(item.unit_value)}</td>
          <td class="text-end">${fmtKamas(item.total_cost)}</td>
        `;
        tbody.appendChild(tr);
      }
      document.getElementById("shopping-total").textContent = fmtKamas(data.total_cost);
    }
  </script>
</body>
</html>
